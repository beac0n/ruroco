name: Continuous Integration
permissions:
  contents: write

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'  # Trigger for any tag starting with 'v'
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run Check
        uses: workflow/nix-shell-action@v3
        with:
          script: nix-shell nix/linux.nix --pure --run 'make check'

  typos:
    name: Typos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check typos
        uses: crate-ci/typos@master

  audit:
    name: Dependency advisories
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: cargo-deny (advisories, licenses, bans, sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run short fuzz smoke check
        run: make fuzz_smoke

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build
        uses: workflow/nix-shell-action@v3
        with:
          script: nix-shell nix/linux.nix --pure --run 'make build'

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build Android
        run: make release_android

  test-end-to-end:
    name: Test end to end
    runs-on: ubuntu-22.04
    needs: [build]
    steps:
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests end to end
        run: make test_end_to_end

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run Check
        uses: workflow/nix-shell-action@v3
        with:
          script: nix-shell nix/linux.nix --pure --run 'make test'

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Generate code coverage
        run: nix-shell nix/linux.nix --pure --run 'make coverage'
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v2
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Check formatting
        run: nix-shell nix/linux.nix --pure --run 'make format'

  release:
    name: Create Release
    runs-on: ubuntu-22.04
    needs: [test, test-end-to-end]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Extract Tag Name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Clean
        run: make clean
      - name: Release
        run: make release_linux
      - name: Move Files
        run: |
          mv target/x86_64-unknown-linux-gnu/release/client client-${{ env.TAG_NAME }}-x86_64-linux
          mv target/x86_64-unknown-linux-gnu/release/client_ui client-ui-${{ env.TAG_NAME }}-x86_64-linux
          mv target/x86_64-unknown-linux-gnu/release/commander commander-${{ env.TAG_NAME }}-x86_64-linux
          mv target/x86_64-unknown-linux-gnu/release/server server-${{ env.TAG_NAME }}-x86_64-linux
      - name: Sign Binaries
        run: |
          printf '%s' "${{ secrets.RUROCO_SIGNING_KEY }}" > release_ed25519.key
          for f in client client-ui commander server; do
            openssl pkeyutl -sign -inkey release_ed25519.key -rawin \
              -in "$f-${{ env.TAG_NAME }}-x86_64-linux" \
              -out "$f-${{ env.TAG_NAME }}-x86_64-linux.sig"
          done
          rm -f release_ed25519.key
      - name: Publish Release
        run: |
          gh release create ${{ env.TAG_NAME }} \
            client-${{ env.TAG_NAME }}-x86_64-linux \
            client-${{ env.TAG_NAME }}-x86_64-linux.sig \
            client-ui-${{ env.TAG_NAME }}-x86_64-linux \
            client-ui-${{ env.TAG_NAME }}-x86_64-linux.sig \
            commander-${{ env.TAG_NAME }}-x86_64-linux \
            commander-${{ env.TAG_NAME }}-x86_64-linux.sig \
            server-${{ env.TAG_NAME }}-x86_64-linux \
            server-${{ env.TAG_NAME }}-x86_64-linux.sig \
            --title "Release ${{ env.TAG_NAME }}" \
            --notes "See https://github.com/beac0n/ruroco/blob/master/CHANGELOG.md"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_android:
    name: Create Release for Android
    runs-on: ubuntu-latest
    needs: [release, build_android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Extract Tag Name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Clean
        run: make clean
      - name: Release
        run: make release_android
      - name: Move Files
        run: mv target/x/release/android/ruroco.apk client-${{ env.TAG_NAME }}-aarch64-linux-android.apk
      - name: Publish Release
        run: gh release upload ${{ env.TAG_NAME }} client-${{ env.TAG_NAME }}-aarch64-linux-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
