[ruroco]
enable   = true
# ruroco is UDP-only; DEFAULT_PORT in src/server/socket.rs is 34020.
# Override this to match your deployment if you bind a different port via the
# CLI argument, RUROCO_LISTEN_ADDRESS, or a systemd socket unit.
port     = 34020
protocol = udp
#backend = systemd # enable if using journalctl
#logfile = /var/log/syslog # if that is were logs are being sent
filter   = ruroco
maxretry = 5
